<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лагерные питомцы</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="topbar">
    <h1>🐾 Лагерные питомцы</h1>
    <div class="topbar-actions" id="topActions"></div>
  </div>

  <div class="wrap">
    <div id="configWarn" style="display:none" class="card" >
      <h3 style="color:var(--warn)">⚠️ Сначала настрой проект</h3>
      <p>Открой <code>config.js</code> и впиши свои <code>owner</code>, <code>repo</code> и <code>token</code>.
         Подробная инструкция — в <code>README.md</code>.</p>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap">
      <h2 style="margin:0">Все питомцы</h2>
      <div style="display:flex; gap:6px">
        <button class="btn btn--ghost btn--small" id="sortPoints">🏆 По очкам</button>
        <button class="btn btn--ghost btn--small" id="sortName">А-Я По имени</button>
        <button class="btn btn--ghost btn--small" id="refresh" title="Обновить">↻</button>
      </div>
    </div>

    <div id="gallery" class="loading">
      <span class="spinner"></span>
      <p>Загружаем питомцев…</p>
    </div>
  </div>

  <div id="toast"></div>

  <script src="config.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ranks.js"></script>
  <script src="assets/js/pet-renderer.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
